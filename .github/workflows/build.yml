name: build-windows

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_DEFAULT_TRIPLET: x64-windows
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ============================================================
      # 1. Checkout
      # ============================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ============================================================
      # 2. Setup vcpkg + Cache (GitHub Actions Cache)
      # ============================================================
      - name: Export GitHub Actions cache environment
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Clone vcpkg
        run: |
          if (-not (Test-Path "$env:VCPKG_ROOT")) {
            git clone --depth 1 https://github.com/Microsoft/vcpkg.git "$env:VCPKG_ROOT"
          }

      - name: Bootstrap vcpkg
        run: |
          cd "$env:VCPKG_ROOT"
          if (-not (Test-Path "vcpkg.exe")) {
            .\bootstrap-vcpkg.bat
          }

      # ============================================================
      # 3. Cache vcpkg installed packages
      # ============================================================
      - name: Cache vcpkg packages
        uses: actions/cache@v4
        id: vcpkg-cache
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/installed
            ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      # ============================================================
      # 4. Install Dependencies (spdlog, fmt, yaml-cpp, catch2)
      # ============================================================
      - name: vcpkg install
        run: |
          cd "$env:VCPKG_ROOT"
          .\vcpkg.exe install --triplet=x64-windows `
            spdlog fmt yaml-cpp catch2
        shell: pwsh

      # ============================================================
      # 5. Verify vcpkg packages
      # ============================================================
      - name: Verify installed packages
        run: |
          cd "$env:VCPKG_ROOT"
          .\vcpkg.exe list
        shell: pwsh

      # ============================================================
      # 6. Configure CMake
      # ============================================================
      - name: Configure CMake
        run: |
          cmake -B build -S . `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows
        shell: pwsh

      # ============================================================
      # 7. Build
      # ============================================================
      - name: Build
        run: cmake --build build --config Release --parallel

      # ============================================================
      # 8. Test
      # ============================================================
      - name: Test
        run: ctest --test-dir build --config Release --output-on-failure

      # ============================================================
      # 9. Upload Artifacts
      # ============================================================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TheSeed-Windows-Release
          path: |
            build/Release/*.exe
            build/Release/*.dll
            build/modules/Release/*.dll
            build/Release/modules/*.dll
