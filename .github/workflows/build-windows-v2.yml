name: build-windows

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_DEFAULT_TRIPLET: x64-windows

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ============================================================
      # 1. Checkout
      # ============================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ============================================================
      # 2. Setup MSVC (Visual Studio 2022 with C++ workload)
      # ============================================================
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ============================================================
      # 3. Verify Visual Studio
      # ============================================================
      - name: Verify VS Installation
        shell: cmd
        run: |
          where cl.exe
          cl.exe

      # ============================================================
      # 4. Setup vcpkg
      # ============================================================
      - name: Clone vcpkg
        shell: pwsh
        run: |
          $vcpkgPath = "$env:VCPKG_ROOT"
          if (-not (Test-Path $vcpkgPath)) {
            git clone --depth 1 https://github.com/Microsoft/vcpkg.git $vcpkgPath
          }

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          cd "$env:VCPKG_ROOT"
          if (-not (Test-Path "vcpkg.exe")) {
            .\bootstrap-vcpkg.bat
          }
          .\vcpkg.exe --version

      # ============================================================
      # 5. Cache vcpkg
      # ============================================================
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_ROOT }}/packages
            ${{ env.VCPKG_ROOT }}/downloads
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      # ============================================================
      # 6. Install Dependencies (Classic Mode)
      # ============================================================
      - name: vcpkg install
        shell: pwsh
        run: |
          cd "$env:VCPKG_ROOT"
          .\vcpkg.exe install spdlog:x64-windows fmt:x64-windows yaml-cpp:x64-windows catch2:x64-windows

      # ============================================================
      # 7. Verify installation
      # ============================================================
      - name: Verify vcpkg packages
        shell: pwsh
        run: |
          cd "$env:VCPKG_ROOT"
          Write-Host "=== Installed Packages ==="
          .\vcpkg.exe list
          Write-Host "=== Checking config files ==="
          $sharePath = "$env:VCPKG_ROOT/installed/x64-windows/share"
          if (Test-Path "$sharePath/spdlog") {
            Write-Host "✓ spdlog config found"
            Get-ChildItem "$sharePath/spdlog"
          } else {
            Write-Host "✗ spdlog config NOT found"
          }

      # ============================================================
      # 8. Configure CMake (Ninja instead of VS generator)
      # ============================================================
      - name: Configure CMake
        shell: pwsh
        run: |
          $toolchain = "$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake -B build -S . `
            -G "Ninja Multi-Config" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$toolchain" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      # ============================================================
      # 9. Build
      # ============================================================
      - name: Build
        run: cmake --build build --config Release --parallel

      # ============================================================
      # 10. Test
      # ============================================================
      - name: Test
        run: ctest --test-dir build --config Release --output-on-failure

      # ============================================================
      # 11. Upload Artifacts
      # ============================================================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TheSeed-Windows-Release
          path: |
            build/Release/*.exe
            build/Release/*.dll
            build/modules/Release/*.dll
            build/Release/modules/*.dll
