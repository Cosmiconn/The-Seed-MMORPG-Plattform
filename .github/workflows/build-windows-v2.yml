name: build-windows

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_DEFAULT_TRIPLET: x64-windows

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ============================================================
      # 1. Checkout
      # ============================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ============================================================
      # 2. Setup MSVC
      # ============================================================
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ============================================================
      # 3. Setup vcpkg
      # ============================================================
      - name: Clone vcpkg
        shell: pwsh
        run: |
          $vcpkgPath = "$env:VCPKG_ROOT"
          if (-not (Test-Path $vcpkgPath)) {
            git clone --depth 1 https://github.com/Microsoft/vcpkg.git $vcpkgPath
          }

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          cd "$env:VCPKG_ROOT"
          if (-not (Test-Path "vcpkg.exe")) {
            .\bootstrap-vcpkg.bat
          }
          .\vcpkg.exe --version

      # ============================================================
      # 4. Cache vcpkg
      # ============================================================
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg/installed
            ${{ github.workspace }}/vcpkg/downloads
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      # ============================================================
      # 5. Install Dependencies (RUN FROM REPO ROOT, not vcpkg dir!)
      # ============================================================
      - name: vcpkg install
        shell: pwsh
        run: |
          # WICHTIG: Lauf im REPO-ROOT, nicht im vcpkg-Ordner!
          # vcpkg.json liegt hier, also Manifest-Modus
          & "$env:VCPKG_ROOT/vcpkg.exe" install --triplet=x64-windows

      # ============================================================
      # 6. Verify
      # ============================================================
      - name: Verify vcpkg packages
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT/vcpkg.exe" list


      # ============================================================
      # 7. Configure CMake
      # ============================================================
      - name: Configure CMake
        shell: pwsh
        run: |
          $toolchain = "$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake -B build -S . `
            -G "Ninja Multi-Config" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$toolchain" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      # ============================================================
      # 8. Build
      # ============================================================
      - name: Build
        run: cmake --build build --config Release --parallel

      # ============================================================
      # 9. Test
      # ============================================================
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      # ============================================================
      # 10. Upload Artifacts
      # ============================================================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TheSeed-Windows-Release
          path: |
            build/Release/*.exe
            build/Release/*.dll
            build/modules/Release/*.dll
            build/Release/modules/*.dll
